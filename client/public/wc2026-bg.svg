<svg xmlns="http://www.w3.org/2000/svg" width="480" height="960" viewBox="0 0 480 960" fill="none">
  <defs>
    <linearGradient id="pitch" x1="240" y1="320" x2="240" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c1d3a"/>
      <stop offset="0.45" stop-color="#0a2818"/>
      <stop offset="1" stop-color="#062010"/>
    </linearGradient>
    <radialGradient id="glow-usa" cx="0.85" cy="0.12" r="0.55">
      <stop stop-color="#2A398D" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2A398D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-can" cx="0.08" cy="0.18" r="0.5">
      <stop stop-color="#E61D25" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#E61D25" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-mex" cx="0.92" cy="0.55" r="0.45">
      <stop stop-color="#3CAC3B" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#3CAC3B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="480" height="960" fill="url(#pitch)"/>
  <rect width="480" height="960" fill="url(#glow-usa)"/>
  <rect width="480" height="960" fill="url(#glow-can)"/>
  <rect width="480" height="960" fill="url(#glow-mex)"/>
  <rect width="480" height="960" fill="url(#grid)"/>
  <!-- pitch perspective -->
  <g opacity="0.12" stroke="#7cb342" stroke-width="1.5" fill="none">
    <ellipse cx="240" cy="780" rx="220" ry="55"/>
    <line x1="20" y1="520" x2="460" y2="520"/>
    <line x1="60" y1="620" x2="420" y2="620"/>
    <line x1="100" y1="700" x2="380" y2="700"/>
    <line x1="240" y1="520" x2="240" y2="900"/>
    <circle cx="240" cy="780" r="42"/>
  </g>
  <!-- subtle 26 motif (host year) -->
  <g opacity="0.06" fill="#ffc107">
    <rect x="72" y="120" width="24" height="24" rx="2"/>
    <rect x="108" y="120" width="24" height="24" rx="2"/>
    <rect x="72" y="156" width="24" height="24" rx="2"/>
    <rect x="324" y="200" width="24" height="24" rx="2"/>
    <rect x="360" y="200" width="24" height="24" rx="2"/>
    <rect x="396" y="236" width="24" height="24" rx="2"/>
  </g>
</svg>
