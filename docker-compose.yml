# VPS / any Docker host — persistent SQLite, always on.
# See DEPLOY-VPS.md — cp .env.example .env && bash scripts/vps-deploy.sh

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATA_DIR: /data
    volumes:
      - wc2026-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  wc2026-data:
