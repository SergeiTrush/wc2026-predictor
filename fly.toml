# fly launch && fly deploy
# Requires: fly auth login, Node 22 (see Dockerfile)

app = 'wc2026-predictor'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  DATA_DIR = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'wc2026_data'
  destination = '/data'
