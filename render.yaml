# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: wc2026-predictor
    runtime: node
    # Persistent disks require a paid instance (free tier uses ephemeral storage).
    plan: starter
    # Repo root (not client/) — single package.json for app + Vite
    rootDir: .
    # Do not set NODE_ENV=production during build — Vite is a devDependency
    buildCommand: npm install --include=dev && npm run build
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /health
    # Node.js app root is /opt/render/project/src — mount disk on ./data
    disk:
      name: wc2026-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: JWT_SECRET
        generateValue: true
      - key: API_FOOTBALL_KEY
        sync: false
      - key: API_FOOTBALL_LEAGUE_ID
        value: "1"
      - key: API_FOOTBALL_SEASON
        value: "2026"
